<!DOCTYPE html>
<html>
<head>
    <title>Happy Customers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #000;
        }

        .customer-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border: 4px solid #111;
        }

        .img-2 {
            margin-left: -25px;
        }

        .img-3 {
            margin-left: -25px;
        }

        .rating-star {
            color: #f4c430;
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="d-flex align-items-center">

        <!-- Images -->
        <div class="d-flex">
            <img src="img1.jpg" class="rounded-circle customer-img">
            <img src="img2.jpg" class="rounded-circle customer-img img-2">
            <img src="img3.jpg" class="rounded-circle customer-img img-3">
        </div>

        <!-- Text -->
        <div class="ms-4 text-white">
            <h4 class="mb-2">Our Happy Customers</h4>
            <div class="d-flex align-items-center">
                <span class="rating-star me-2">★</span>
                <strong>4.8</strong>
                <span class="text-secondary ms-2">(18.5k Review)</span>
            </div>
        </div>

    </div>
</div>

</body>
</html>
