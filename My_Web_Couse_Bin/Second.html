<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger Card</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --back-ground-clr1: #FFCDA2;
            --back-ground-clr2: #FFA453;
        }

        body {
            background: linear-gradient(180deg, var(--back-ground-clr1), var(--back-ground-clr2));
        }

        .background1 {
            background-image: url('../Burger/Assets/Images/background_1.png');
            /* Aapki shape image */
            background-size: 95% 80%;
            /* Ye zaroori hai taaki image stretch ho kar card fit kare */
            background-repeat: no-repeat;
            /* background-position: center; */
            min-height: 380px;
            /* Adjust karein jab tak text andar na aa jaye */
            position: relative;
            border-radius: 15px;
            /* Image ke corners ke saath match karne ke liye */
        }

        .burger-img {
            max-height: 300px;
            /* Burger ka size control karne ke liye */
            /* object-fit: contain; */
        }

        /* Arrow ko us niche wale "tab" par laane ke liye */
        .arrow-container {
            position: absolute;
            bottom: 115px;
            /* Image ke niche wale tab ke hisaab se adjust karein */
            right: 35px;
            font-size: 1.2rem;
        }

        .text-and-price {
            padding-bottom: 150px;
            /* Taaki niche arrow ke liye jagah rahe */
        }

        .start_arrow_icon {
            background-color: #f0f0f0;
            border-radius: 50%;
            border: 2px;

            color: var(--back-ground-clr2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 50px;
            width: 200px;
        }
    </style>
</head>

<body>

    <!-- <div class="col-lg-3 col-md-4 col-sm-6"></div> -->
    <div class="container-fluid">

        </div>
        <div class="d-flex">

                <i class="bi bi-arrow-left"></i>

            <div class="col-3">

                <div class="background1 d-flex flex-column justify-content-between p-4">
                    <div class="text-end">
                        <i class="bi bi-suit-heart heart text-white"></i>
                    </div>

                    <div class="text-center">
                        <img src="Assets/Images/b1_burger1.png" class="img-fluid burger-img" alt="Veg Burger">
                    </div>

                    <div class="text-and-price-card text-white mt-auto">
                        <div class="fw-semibold fs-5">Veg Crispy Burger</div>
                        <div class="d-flex justify-content-between align-items-center mt-1">
                            <span class="fw-bold">₹250.00 <i class="bi bi-bag-dash ms-5"></i></span>
                        </div>

                        </div>
                    </div>

                        </div>
                        <div class="arrow-container">
                            <i class="bi bi-arrow-right"></i>
                        </div>
                    </div>
                </div>
            </div>

                            <span class="fw-bold">₹250.00 <i class="bi bi-bag-dash ms-2"></i></span>
                        </div>
                        <div class="arrow-container">
                            <i class="bi bi-arrow-right"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
