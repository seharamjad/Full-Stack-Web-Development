<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Learning JavaScript</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <!-- For Age -->
    <div class="d-flex">
        <input type="number" class="form-control" id="inputAge" placeholder="Enter Your Age">
        <button class="btn btn-warning" onclick="checkAge()">Check Age</button>
    </div>
    <div id="msg"></div>

    <!-- For Password -->
    <div class="d-flex mt-5">
        <input type="password" class="form-control" id="inputPass" placeholder="Enter Your Password">
        <button onclick="veiwPassword();" class="btn btn-primary"><i id="iconPass" class="bi bi-eye-fill"></i></button>
    </div>
    <!-- For Products -->
    <button onclick="changedData();" class="btn btn-info mt-5">Get Products</button>


    <div class="container">
        <div class="row" id="productRow">

        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        function changedData() {
            var products = ['pasta', 'burger', 'pizza', 'fries', 'noodles'];

            var productRow = document.getElementById("productRow");
            var productData = '';

            for (var i = 0; i < products.length; i++) {
                productData += `
            <div class= 'col-3'>
                <div class="card">
                    <div class="h3"> ${products[i]}</div>
                    </div>
                
                </div>`;
            }


            productRow.innerHTML = productData;
        }



        function veiwPassword() {
            var input = document.getElementById('inputPass');
            var icon = document.getElementById("iconPass");

            if (input.type == "password") {
                input.type = "text";
                icon.classList.remove("bi-eye-fill");
                icon.classList.add("bi-eye-slash-fill")
            } else {
                input.type = "password";
                icon.classList.remove("bi-eye-slash-fill");
                icon.classList.add("bi-eye-fill")
            }
        }

        function checkAge() {
            var age = document.getElementById("inputAge").value;
            var msg = document.getElementById("msg");
            var oldText = 'You are Old';
            var youngText = 'You are Young';

            if (age > 40) {
                msg.innerHTML = `<div class="alert alert-danger">${oldText}</div>`;
            } else {
                msg.innerHTML = `<div class="alert alert-success">${youngText}</div>`;
            }
        }
    </script>


</body>

</html>
